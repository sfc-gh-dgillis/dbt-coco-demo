version: '3'

includes:
  validate-prerequisites: ./tasks/validate-prerequisites/validate-prerequisite-tasks.yml
  snow-cli:
    taskfile: ./tasks/snow-cli/snowcli-tasks.yml
    dir: ./tasks/snow-cli
  python:
    taskfile: ./tasks/python/python-tasks.yml
  dbt:
    taskfile: ./tasks/dbt/dbt-tasks.yml

env:
  ENV_DIR: .env

dotenv: ['{{ .ENV_DIR }}/{{ .DOTENV_FILENAME | default "demo.env" }}']

tasks:

  demo-up:
    desc: |
      Usage: `task demo-up` if using the default demo.env file. Use `DOTENV_FILENAME=custom.env task demo-up`
      if using a custom .env file (filename does not have to be custom.env, but must end with .env).

    cmds:
      - task: python:create-venv

      - task: python:install-dbt

      - task: dbt:deps

      - task: validate-prerequisites:snowcli
        silent: true

      - task: dbt:create-udf-concatenate-object-values
        vars:
          TARGET: dev-keypair-auth
          ARGS: '{database: dev_dbt_demo, schema: utilities}'

      - task: dbt:test-udf-concatenate-object-values
        vars:
          CLI_CONNECTION_NAME: $CLI_CONNECTION_NAME
          WAREHOUSE: dbt_demo_xs_wh
          DATABASE_NAME: dev_dbt_demo
          SCHEMA_NAME: utilities

  demo-init:
    desc: Runs the full DCM deployment to stand up the required Snowflake infrastructure (database, schemas, roles, warehouses, tables, grants, and raw data load).
    vars:
      DCM_DATABASE: DCM_ADMIN
      DCM_SCHEMA: PROJECTS
      DCM_PROJECT_NAME: DBT_COCO_DEMO_DCM
    cmds:
      - task: validate-prerequisites:snowcli-version
        vars:
          MIN_VERSION: "3.16.0"
      - task: snow-cli:deploy-dcm-project
        vars:
          CLI_CONNECTION_NAME: $CLI_CONNECTION_NAME
          DCM_PROJECT_PATH: dcm
          DCM_PROJECT_IDENTIFIER: "{{.DCM_DATABASE}}.{{.DCM_SCHEMA}}.{{.DCM_PROJECT_NAME}}"
          DCM_DATABASE: "{{.DCM_DATABASE}}"

  destroy-demo:
    desc: Drops the demo database from Snowflake.
    cmds:
      - task: snow-cli:drop-database-if-exists
        vars:
          CLI_CONNECTION_NAME: $CLI_CONNECTION_NAME
          DEMO_DATABASE_NAME: dev_dbt_demo

  reset-demo:
    desc: Remove all generated artifacts (venv, dbt_packages, logs, target, package-lock.yml)
    cmds:
      - rm -rf venv dbt_packages logs target package-lock.yml
