version: '3'

tasks:

  debug:
    cmds:
      - dbt debug --target dev-tastyb --project-dir .

  create-udf-concatenate-object-values:
    cmds:
      - dbt run-operation create_udf_concatenate_object_values --target "{{.TARGET}}" --args "{{.ARGS}}"

  test-udf-concatenate-object-values:
    cmds:
      - echo "WTF"
