  build-all:
    cmds:
      - dbt build --target dev-tastyb --project-dir .

  build-country-dimension:
    cmds:
      - dbt build --target dev-tastyb --project-dir . --select d_country

  docs-generate-and-serve:
    cmds:
      - dbt docs generate --target dev-tastyb --project-dir .
      - dbt docs serve --target dev-tastyb --project-dir .

